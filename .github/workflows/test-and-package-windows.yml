name: Test and package on Windows
on: [push]
jobs:     
  test-on-windows:
    name: Run nose2 on Windows runner
    runs-on: windows-2025
    defaults:
      run:
        shell: bash -l {0}        
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0    
      with:
        submodules: true    
        
    - name: Set up Visual Studio shell
      uses: egor-tensin/vs-shell@v2.1
      with:
        arch: x64   
        
    - name: Remove link
      run: |
        rm -f /usr/bin/link.exe
        
    - name: Remove lines with [not win]
      run: |
        sed -i '/\[not win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
    
    - name: Install package locally
      run: |
        pip install --verbose --editable .
        
    - name: Run cytoflow tests
      env:
        OMP_NUM_THREADS: 1
      run: |
        nose2 -v -c package/nose2.cfg cytoflow.tests

#     - name: Run cytoflowgui tests
#       env:
#         OMP_NUM_THREADS: 1
#       run: |
#         nose2 -v -c package/nose2.cfg cytoflowgui.tests -GUI        

    
  build-windows-conda-package:
    name: Build windows conda package
    runs-on: windows-2025
    defaults:
      run:
        shell: bash -l {0}
    needs: test-on-windows
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 0
        submodules: true
        
    - name: Set up Visual Studio shell
      uses: egor-tensin/vs-shell@v2.1
      with:
        arch: x64        
        
    - name: Remove link
      run: |
        rm -f /usr/bin/link.exe
        
    - name: Remove lines with [not win]
      run: |
        sed -i '/\[not win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
        
    - name: Build conda package
#       continue-on-error: true
      run: |
        conda-render package/conda_recipes/cytoflow
        conda-build package/conda_recipes/cytoflow
        
#     - name: Zip up the build directory
#       run: |
#         7z a -tzip conda-build.zip /c/Miniconda/envs/cytoflow/conda-bld/
#                 
#     - name: Save the contents of the conda-build folder as artifacts
#       uses: actions/upload-artifact@v7.0.1
#       with:
#         name: windows-conda-build-dir
#         retention-days: 7
#         path: conda-build.zip
        
    - name: Move conda package into the dist folder
      run: |
        mkdir dist
        mv `conda-build --output package/conda_recipes/cytoflow/` dist
        
    - name: Copy package/environment-build.yml into the dist folder
      run: |
        cp package/environment-build.yml dist/
        
    - name: List dist
      run: ls dist/
      
    - name: Save the contents of the dist/ folder as artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: windows-conda-package
        retention-days: 7
        path: dist/*

    - name: Get file names
      id: get_filenames
      run: |
        cd dist
        echo "CONDA_PACKAGE=$(ls cytoflow*.conda)" >> $GITHUB_OUTPUT
        
      # commented out because the file name is the same for each platform.
      # upload to anaconda.org instead.        
        
#     - name: Upload the conda package to the GitHub release
#       uses: actions/upload-release-asset@v1.0.2
#       env:
#         GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
#       with:
#         upload_url: ${{ github.event.client_payload.release_url }} 
#         asset_path: dist/${{ steps.get_filenames.outputs.CONDA_PACKAGE }}
#         asset_name: ${{ steps.get_filenames.outputs.CONDA_PACKAGE }}
#         asset_content_type: application/zip
         
    - name: Upload the conda package to anaconda.org
      if: github.ref_type == 'tag'
      run: |
        anaconda -t ${{ secrets.CONDA_TOKEN }} upload --user cytoflow --force dist/${{ steps.get_filenames.outputs.CONDA_PACKAGE }}
        

  build-windows-wheels:
    name: Build wheels and binary extension
    needs: test-on-windows
    runs-on: windows-2025
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0  
      with:
        fetch-depth: 0
        submodules: true
        
    - name: Set up Visual Studio shell
      uses: egor-tensin/vs-shell@v2.1
      with:
        arch: x64  
        
    - name: Remove link
      run: |
        rm -f /usr/bin/link.exe
        
    - name: Remove lines with [not win]
      run: |
        sed -i '/\[not win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
    
    - name: Install package locally
      run: |
        pip install --verbose --editable .
        
    - name: Install packaging deps
      run: |
        pip install build
        
    - name: Build wheel
      run: |
        python -m build --wheel
        
    - name: Move C++ extensions into the dist folder
      run: |
        cp `find build | grep "\.pyd$"` dist/
        
    - name: List dist
      run: ls dist/
      
    - name: Save the contents of the dist/ folder as artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: windows-wheels
        retention-days: 7
        path: dist/*   
        
    - name: Get file names
      id: get_filenames
      run: |
        cd dist
        echo "EXTENSION_FILE=$(ls _Logicle*.pyd)" >> $GITHUB_OUTPUT
        echo "WHEEL_FILE=$(ls cytoflow*.whl)" >> $GITHUB_OUTPUT
      
    - name: Upload files to a Github release
      uses: softprops/action-gh-release@v3
      if: github.ref_type == 'tag'
      with:
        draft: true
        working_directory: dist
        files: |
          ${{ steps.get_filenames.outputs.EXTENSION_FILE }}
          ${{ steps.get_filenames.outputs.WHEEL_FILE }}
        
  build-windows-oneclick:
    name: Build Windows one-click
    needs: test-on-windows
    runs-on: windows-2025
    defaults:
      run:
        shell: bash -l {0}
    steps:        
    - name: Check out repo
      uses: actions/checkout@v7.0.0  
      with:
        fetch-depth: 0
        submodules: true
        
    - name: Set up Visual Studio shell
      uses: egor-tensin/vs-shell@v2.1
      with:
        arch: x64
        
    - name: Remove link
      run: |
        rm -f /usr/bin/link.exe
        
    - name: Install NSIS
      uses: repolevedavaj/install-nsis@v1.2.1
      with:
        nsis-version: '3.10'
        
    - name: Show all the files
      run: find .
      
    - name: Query git tag
      id: tag
      run: echo "GIT_TAG=$(git describe --tags)" >> $GITHUB_ENV
        
    - name: Show Tag
      id: display
      run: |
        echo "Output from Find Tag: ${GIT_TAG}"
        
    - name: Remove lines with [not win]
      run: |
        sed -i '/\[not win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
            
    - name: Install package locally
      run: |
        pip install --verbose --editable .
        
    - name: Build embedded help docs
      run: |
        sphinx-build docs/user_manual/reference cytoflowgui/help
        
    - name: Build GUI binary
      run: |
        pyinstaller package/pyinstaller.spec
        
    - name: Build installer
      run: |
        makensis.exe //NOCD package/installer.nsis
        
    - name: Rename installer and remove remaining files
      id: zip_app
      run: |
        cd dist
        mv cytoflow-installer.exe cytoflow-installer-${GIT_TAG}-win-amd64.exe
        echo "GUI_FILE=cytoflow-gui-${GIT_TAG}-win_x86-64.exe" >> $GITHUB_OUTPUT
        rm -rf cytoflow
        
    - name: List dist
      run: ls dist/
      
    - name: Save the contents of the dist/ folder as artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: windows-oneclick
        retention-days: 7
        path: dist/*
        
    - name: Upload files to a Github release
      uses: softprops/action-gh-release@v3
      if: github.ref_type == 'tag'
      with:
        draft: true
        working_directory: dist
        files: |
          ${{ steps.zip_app.outputs.GUI_FILE }}
