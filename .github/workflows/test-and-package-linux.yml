name: Test and package on Linux
on: [push]
jobs:
  check-environment:
    name: Make sure environment.yml and meta.yaml are the same
    runs-on: ubuntu-22.04
    steps:
    
    - name: Check out repo
      uses: actions/checkout@v7.0.0   
      
    - name: Compare meta.yaml and environment.yml
      run: |
        gawk -f package/make_environment.awk package/conda_recipes/cytoflow/meta.yaml | gawk -f package/parse_environment.awk > env_meta
        gawk -f package/parse_environment.awk environment.yml > env_mine
        diff -u env_meta env_mine
        
    - name: Compare meta.yaml and package/environment-build.yml
      run: |
        gawk -f package/make_environment.awk package/conda_recipes/cytoflow/meta.yaml | gawk -f package/parse_environment.awk > env_meta
        gawk -f package/parse_environment.awk package/environment-build.yml | sed '/# build/d' > env_mine
        diff -u env_meta env_mine
      
  test-on-linux:
    name: Run nose2 on linux runner
    needs: check-environment
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0  
      with:
        submodules: true
      
    - name: Remove lines with [win]
      run: |
        sed -i '/\[win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
    
    - name: Install the package
      run: |
        pip install --verbose --editable .
        
    - name: Run cytoflow tests
      env:
        OMP_NUM_THREADS: 1
      run: |
        nose2 -v -c package/nose2.cfg cytoflow.tests

#     - name: Run cytoflowgui tests
#       env:
#         OMP_NUM_THREADS: 1
#       run: |
#         nose2 -v -c package/nose2.cfg cytoflowgui.tests -GUI    

#    - name: GUI smoketest
#      run: |  
#        python --version
#        timeout -k 10 60s xvfb-run python cytoflowgui/run.py cytoflowgui/tests/startup-test.flow

    
  build-linux-conda-package:
    name: Build linux conda package
    runs-on: ubuntu-22.04
    needs: test-on-linux
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 0
        submodules: true
      
    - name: Remove lines with [win]
      run: |
        sed -i '/\[win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
        
    - name: Build conda package
      run: |
        conda-render package/conda_recipes/cytoflow
        conda-build --quiet package/conda_recipes/cytoflow
        
#     - name: Zip up the build directory
#       run: |
#         zip -r conda-build.zip /usr/share/miniconda/envs/cytoflow/conda-bld/
#         
#     - name: Save the contents of the conda-build folder as artifacts
#       uses: actions/upload-artifact@v7.0.1
#       with:
#         name: linux-conda-build-dir
#         retention-days: 7
#         path: conda-build.zip
        
    - name: Move conda package into the dist folder
      run: |
        mkdir dist
        mv `conda-build --output package/conda_recipes/cytoflow/` dist
        
    - name: Copy package/environment-build.yml into the dist folder
      run: |
        cp package/environment-build.yml dist/
        
    - name: List dist/
      run: ls dist/
      
    - name: Save the contents of the dist/ folder as artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: linux-conda-package
        retention-days: 7
        path: dist/*
        
    - name: Get file names
      id: get_filenames
      run: |
        cd dist
        echo "CONDA_PACKAGE=$(ls cytoflow*.conda)" >> $GITHUB_OUTPUT
        
      # commented out because the file name is the same for each platform.
      # upload to anaconda.org instead.        
        
#     - name: Upload the conda package to the GitHub release
#       uses: actions/upload-release-asset@v1.0.2
#       env:
#         GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
#       with:
#         upload_url: ${{ github.event.client_payload.release_url }} 
#         asset_path: dist/${{ steps.get_filenames.outputs.CONDA_PACKAGE }}
#         asset_name: ${{ steps.get_filenames.outputs.CONDA_PACKAGE }}
#         asset_content_type: application/zip
        
    - name: Upload conda package to anaconda.org
      if: github.ref_type == 'tag'
      run: |
        anaconda -t ${{ secrets.CONDA_TOKEN }} upload --user cytoflow dist/${{ steps.get_filenames.outputs.CONDA_PACKAGE }}

  build-linux-wheels:
    name: Build source dist, wheels and binary extension
    needs: test-on-linux
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0  
      with:
        fetch-depth: 0
        submodules: true
      
    - name: Remove lines with [win]
      run: |
        sed -i '/\[win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
        
    - name: Install packaging deps
      run: |
        pip install build
            
    - name: Install package locally
      run: |
        pip install --verbose --editable .
        
    - name: Build source dist
      run: |
        python -m build --sdist
        
    - name: Build wheel
      run: |
        python -m build --wheel
        
    - name: Move C++ extensions into the dist folder
      run: |
        cp `find build | grep "\.so$"` dist/
        
    - name: List dist/
      run: ls dist/
      
    - name: Save the contents of the dist/ folder as artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: linux-wheels
        retention-days: 7
        path: dist/*   
        
    - name: Get file names
      id: get_filenames
      run: |
        cd dist
        echo "EXTENSION_FILE=$(ls _Logicle*.so)" >> $GITHUB_OUTPUT
        echo "WHEEL_FILE=$(ls cytoflow*.whl)" >> $GITHUB_OUTPUT
        echo "SDIST_FILE=$(ls cytoflow*.tar.gz)" >> $GITHUB_OUTPUT
        
    - name: Upload files to a Github release
      uses: softprops/action-gh-release@v3
      if: github.ref_type == 'tag'
      with:
        draft: true
        files: |
          ${{ steps.get_filenames.outputs.EXTENSION_FILE }}
          ${{ steps.get_filenames.outputs.WHEEL_FILE }}
          ${{ steps.get_filenames.outputs.SDIST_FILE }}
        
  build-linux-oneclick:
    name: Build linux one-click
    needs: test-on-linux
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0  
      with:
        fetch-depth: 0
        submodules: true
      
    - name: Query git tag
      id: tag
      run: echo "GIT_TAG=$(git describe --tags)" >> $GITHUB_ENV
        
    - name: Show Tag
      id: display
      run: |
        echo "Output from Find Tag: ${GIT_TAG}"
      
    - name: Remove lines with [win]
      run: |
        sed -i '/\[win\]/d' package/environment-build.yml
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        channels: defaults, cytoflow, conda-forge
        channel-priority: flexible
        activate-environment: cytoflow
        environment-file: package/environment-build.yml
        
    - name: Install package locally
      run: |
        pip install --verbose --editable .
        
    - name: Build embedded help docs
      run: |
        sphinx-build docs/user_manual/reference cytoflowgui/help
        
    - name: Build GUI binary
      run: |
        pyinstaller --log-level=DEBUG package/pyinstaller.spec
        
#    - name: GUI binary smoketest
#      run: |
#        xvfb-run dist/cytoflow/cytoflowgui ../../cytoflowgui/tests/startup-test.flow

    - name: Rename directory and make a tarball
      id: rename_directory
      run: |
        cd dist
        mv cytoflow cytoflow-${GIT_TAG}
        tar -cjf cytoflow-gui-${GIT_TAG}.linux_x86-64.tar.bz2 cytoflow-${GIT_TAG}
        rm -rf cytoflow-${GIT_TAG}
        echo "GUI_FILE=$(ls cytoflow*.tar.bz2)" >> $GITHUB_OUTPUT
        
    - name: List dist/
      run: ls dist/
      
    - name: Save the contents of the dist/ folder as artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: linux-oneclick
        path: dist/*
        retention-days: 7
        
    - name: Upload files to a Github release
      uses: softprops/action-gh-release@v3
      if: github.ref_type == 'tag'
      with:
        draft: true
        files: |
          ${{ steps.rename_directory.outputs.GUI_FILE }}
        
  build-examples:
    name: Zip up examples
    needs: test-on-linux
    runs-on: ubuntu-22.04
    steps:
    - name: Check out repo
      uses: actions/checkout@v7.0.0  
      with:
        fetch-depth: 0
        submodules: true
      
    - name: Query git tag
      id: tag
      run: echo "GIT_TAG=$(git describe --tags)" >> $GITHUB_ENV
        
    - name: Show Tag
      id: display
      run: |
        echo "Output from Find Tag: ${GIT_TAG}"
        
    - name: Zip up examples
      id: zip_examples
      run: |
        mkdir dist
        cd docs
        zip -r cytoflow-${GIT_TAG}-examples-basic.zip examples-basic
        echo "BASIC_FILE=cytoflow-${GIT_TAG}-examples-basic.zip" >> $GITHUB_OUTPUT
        zip -r cytoflow-${GIT_TAG}-examples-advanced.zip examples-advanced
        echo "ADVANCED_FILE=cytoflow-${GIT_TAG}-examples-advanced.zip" >> $GITHUB_OUTPUT

        mv cytoflow-${GIT_TAG}-examples-*.zip ../dist
        cd ..
        
    - name: List dist/
      run: ls dist/
      
    - name: Save the contents of the dist/ folder as artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: examples
        retention-days: 7
        path: dist/*
        
    - name: Upload files to a Github release
      uses: softprops/action-gh-release@v3
      if: github.ref_type == 'tag'
      with:
        draft: true
        files: |
          ${{ steps.zip_examples.outputs.BASIC_FILE }}
          ${{ steps.zip_examples.outputs.ADVANCED_FILE }}

        